spring.application.name=backend
spring.config.import=optional:file:.env[.properties]

# MongoDB 
spring.data.mongodb.uri=${MONGODB_URI}

# OAuth2 Google
spring.security.oauth2.client.registration.google.client-id=416440966451-8rj93dl9i7v5b5lg54qe65lr93jsdgcv.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# JWT 
app.jwt.secret=${JWT_SECRET_KEY}
app.jwt.expiration=86400000
app.frontend.url=http://localhost:5173
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174

# Mail Configuration
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM_ADDRESS}

# File upload & Admin
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB